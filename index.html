<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flower Journal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>" />
  <link rel="preload" href="fonts/Wnz6HAc5bAfYB2Q7ZjYY.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-petals" id="bgPetals" aria-hidden="true"></div>
  <div class="app">
    <header class="hero">
      <h1>Flower Journal</h1>
      <p class="tagline">A garden of small moments, opening one day at a time</p>
    </header>

    <nav class="month-nav">
      <button id="prevMonth" class="nav-btn" aria-label="Previous">‹</button>
      <div class="month-label">
        <h2 id="monthLabel"></h2>
        <span id="bloomCount" class="bloom-count"></span>
      </div>
      <button id="nextMonth" class="nav-btn" aria-label="Next">›</button>
    </nav>

    <div class="view-toggle" role="tablist" aria-label="Layout">
      <button id="viewFlat" class="view-btn active" role="tab" aria-selected="true">Flat</button>
      <button id="viewRing" class="view-btn" role="tab" aria-selected="false">Ring</button>
      <button id="viewYear" class="view-btn" role="tab" aria-selected="false">Year</button>
    </div>

    <div class="weekday-row" id="weekdayRow"></div>

    <main id="calendarGrid" class="calendar-grid" aria-live="polite"></main>

    <div class="footer-actions">
      <button id="exportBtn" class="today-btn" hidden>Save my year as an image</button>
      <button id="todayBtn" class="today-btn">Back to Today</button>
    </div>
  </div>

  <!-- Cover / intro : a diary you turn through -->
  <div id="coverScreen" class="cover">
    <div class="book-stage">
      <div class="book" id="book">
        <!-- the journal awaits beneath the last page -->
        <div class="book-base" aria-hidden="true">
          <div class="base-inner">
            <div class="page-flower" id="coverPageArt"></div>
            <p class="page-hello">your journal</p>
            <p class="page-sub">awaits…</p>
          </div>
        </div>

        <!-- second leaf: the handwritten welcome page -->
        <div class="leaf" id="leafWelcome">
          <div class="face front welcome-face">
            <p class="w-date" id="welcomeDate"></p>
            <p class="w-hello">Dear diary,</p>
            <p class="w-note">here's a little garden of days.<br>open one, keep a memory,<br>and watch it bloom.</p>
            <div class="w-flower" id="welcomeFlower" aria-hidden="true"></div>
            <p class="turn-cue">turn the page&nbsp;→</p>
          </div>
          <div class="face back" aria-hidden="true"></div>
        </div>

        <!-- first leaf: the front cover -->
        <div class="leaf" id="leafCover">
          <div class="face front cover-face">
            <span class="book-spine-edge" aria-hidden="true"></span>
            <div class="cover-embroidery" id="coverEmbroidery" aria-hidden="true"></div>
            <div class="cover-center">
              <h1 class="cover-title">Flower Journal</h1>
              <p class="cover-tagline">flowers will bloom</p>
            </div>
            <span class="cover-year" id="coverYear"></span>
            <span class="cover-ribbon" aria-hidden="true"></span>
          </div>
          <div class="face back cover-inside" aria-hidden="true">
            <p class="inside-note">Flower Journal</p>
            <p class="inside-sub" id="insideYear"></p>
          </div>
        </div>
      </div>

      <button id="startBtn" class="cover-btn">Open the journal</button>
      <p class="turn-hint" id="turnHint"></p>
    </div>
  </div>

  <!-- Entry Modal -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalDate">
      <button id="closeModal" class="close-btn" aria-label="Close">×</button>

      <div class="modal-flower" id="modalFlowerDisplay"></div>
      <h3 id="modalDate"></h3>

      <div class="field-group">
        <label class="field-label">Today's flower</label>
        <div id="flowerPicker" class="flower-picker"></div>
      </div>

      <div class="field-group">
        <label class="field-label">Today's mood</label>
        <div id="moodPicker" class="mood-picker"></div>
      </div>

      <div class="field-group">
        <label class="diary-label" for="memoryText">Dear diary,</label>
        <textarea id="memoryText" rows="5" placeholder="Write about today — the big things, the small things…"></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">A photo from today</label>
        <div class="photo-upload">
          <input type="file" id="photoInput" accept="image/*" />
          <div id="photoPreviewWrap" class="photo-preview-wrap" hidden>
            <img id="photoPreview" alt="Memory photo preview" />
            <button id="removePhoto" class="remove-photo-btn" type="button">Remove photo</button>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button id="deleteEntry" class="btn btn-ghost" hidden>Delete entry</button>
        <button id="saveEntry" class="btn btn-primary">Save memory</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
