<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flower Journal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>" />
  <link rel="preload" href="fonts/Wnz6HAc5bAfYB2Q7ZjYY.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- embossing filter for the flowers: a soft bevel + drop shadow so they feel pressed into the stamp -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <filter id="emboss" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur" />
        <feSpecularLighting in="blur" surfaceScale="1.4" specularConstant="0.42" specularExponent="12" lighting-color="#ffffff" result="spec">
          <feDistantLight azimuth="230" elevation="60" />
        </feSpecularLighting>
        <feComposite in="spec" in2="SourceAlpha" operator="in" result="specCut" />
        <feComposite in="SourceGraphic" in2="specCut" operator="arithmetic" k1="0" k2="1" k3="0.55" k4="0" result="lit" />
        <feDropShadow dx="0" dy="1.3" stdDeviation="1" flood-color="#3a2018" flood-opacity="0.3" />
      </filter>
    </defs>
  </svg>
  <!-- living aurora: soft warm blooms of colour that drift slowly behind everything -->
  <div class="aurora" aria-hidden="true">
    <span class="aurora-blob b1"></span>
    <span class="aurora-blob b2"></span>
    <span class="aurora-blob b3"></span>
    <span class="aurora-blob b4"></span>
    <span class="aurora-blob b5"></span>
  </div>
  <div class="bg-petals" id="bgPetals" aria-hidden="true"></div>
  <div class="app">
    <header class="hero">
      <h1>Flower Journal</h1>
      <p class="tagline">A garden of small moments, opening one day at a time</p>
    </header>

    <div class="stats-bar" id="statsBar">
      <div class="stat" id="statStreak"><span class="stat-num" id="streakNum">0</span><span class="stat-lbl">day streak</span></div>
      <div class="stat"><span class="stat-num" id="monthNum">0</span><span class="stat-lbl">blooms this month</span></div>
      <div class="stat"><span class="stat-num" id="collNum">0/16</span><span class="stat-lbl">flowers grown</span></div>
      <button class="today-cta" id="todayCta" type="button"></button>
    </div>

    <nav class="month-nav">
      <button id="prevMonth" class="nav-btn" aria-label="Previous">‹</button>
      <div class="month-label">
        <h2 id="monthLabel"></h2>
        <span id="bloomCount" class="bloom-count"></span>
      </div>
      <button id="nextMonth" class="nav-btn" aria-label="Next">›</button>
    </nav>

    <div class="view-toggle" role="tablist" aria-label="Layout">
      <button id="viewFlat" class="view-btn active" role="tab" aria-selected="true">Flat</button>
      <button id="viewRing" class="view-btn" role="tab" aria-selected="false">Ring</button>
      <button id="viewYear" class="view-btn" role="tab" aria-selected="false">Year</button>
    </div>

    <div class="weekday-row" id="weekdayRow"></div>

    <main id="calendarGrid" class="calendar-grid" aria-live="polite"></main>

    <div class="footer-actions">
      <button id="futureBtn" class="today-btn">✉ Dear future me</button>
      <button id="exportBtn" class="today-btn" hidden>Save my year as an image</button>
      <button id="todayBtn" class="today-btn">Back to Today</button>
    </div>
  </div>

  <!-- Affirmation toast (shown after saving) -->
  <div id="affirmation" class="affirmation" role="status" aria-live="polite" hidden></div>

  <!-- Letter to your future self -->
  <div id="futureOverlay" class="modal-overlay" hidden>
    <div class="modal future-modal" role="dialog" aria-modal="true" aria-labelledby="futureTitle">
      <button id="closeFuture" class="close-btn" aria-label="Close">×</button>
      <div class="modal-flower" id="futureFlower"></div>
      <h3 id="futureTitle">A letter to future you</h3>
      <p class="future-sub" id="futureSub"></p>
      <div class="field-group">
        <label class="diary-label" id="futureSalutation" for="futureText">Dear future me,</label>
        <textarea id="futureText" rows="7" placeholder="What do you hope is true by then? What are you working toward, grateful for, or want to remember? Write it down and seal it."></textarea>
      </div>
      <div class="modal-actions">
        <button id="clearFuture" class="btn btn-ghost" hidden>Start over</button>
        <button id="saveFuture" class="btn btn-primary">Seal this letter</button>
      </div>
    </div>
  </div>

  <!-- Entry : a postage-stamp postcard you open, like Bloomie -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="postcard-stage" role="dialog" aria-modal="true" aria-labelledby="pcDayNum">
      <div class="pc-float">
      <div class="postcard" id="postcard">
        <div class="pc-face">
          <header class="pc-head">
            <div class="pc-datewrap">
              <span class="pc-weekday" id="pcWeekday"></span>
              <span class="pc-daynum" id="pcDayNum"><span id="pcDayN"></span><small id="pcMon"></small></span>
            </div>
            <div class="pc-brand">
              <span class="pc-mark" id="pcMark" aria-hidden="true"></span>
              <span class="pc-brand-name">Flower Journal</span>
              <span class="pc-brand-sub">tiny memories</span>
            </div>
          </header>

          <div class="pc-body">
            <!-- left : the photo, taped into the page -->
            <div class="pc-left">
              <div class="pc-photo" id="pcPhotoCard">
                <span class="pc-tape" aria-hidden="true"></span>
                <input type="file" id="photoInput" accept="image/*" hidden />
                <label for="photoInput" class="pc-photo-empty" id="pcPhotoEmpty">
                  <span class="pc-plus">+</span>
                  <span class="pc-photo-text">Add today's photo</span>
                </label>
                <div id="photoPreviewWrap" class="pc-photo-filled" hidden>
                  <img id="photoPreview" alt="Memory photo" />
                  <button id="removePhoto" class="pc-photo-remove" type="button">Remove</button>
                </div>
                <span class="pc-photo-cap"><span id="pcMoodCap">Today</span> <span class="pc-heart" aria-hidden="true">♡</span></span>
              </div>
            </div>

            <span class="pc-divider" aria-hidden="true"></span>

            <!-- right : the writing -->
            <div class="pc-right">
              <p class="pc-prompt" id="diaryPrompt"></p>
              <textarea id="memoryText" rows="7" placeholder="Write today down, the big things and the small…"></textarea>
              <p class="pc-empty-note" id="pcEmptyNote">No thoughts recorded yet.</p>
            </div>
          </div>

          <!-- edit drawer : pick the day's flower + mood -->
          <div class="pc-edit" id="pcEdit">
            <div class="field-group">
              <label class="field-label">Today's flower</label>
              <div id="flowerPicker" class="flower-picker"></div>
            </div>
            <div class="field-group">
              <label class="field-label">Today's mood</label>
              <div id="moodPicker" class="mood-picker"></div>
            </div>
          </div>
        </div>
      </div>
      </div>

      <!-- frosted glass controls, floating below the stamp -->
      <div class="pc-controls">
        <button id="pcPrev" class="pc-ctrl round" aria-label="Previous day">‹</button>
        <button id="pcEditToggle" class="pc-ctrl">✎ Edit</button>
        <button id="saveEntry" class="pc-ctrl accent" hidden>Save</button>
        <button id="deleteEntry" class="pc-ctrl" hidden>Delete</button>
        <button id="closeModal" class="pc-ctrl">✕ Close</button>
        <button id="pcNext" class="pc-ctrl round" aria-label="Next day">›</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
